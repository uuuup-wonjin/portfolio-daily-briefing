name: 📅 데일리 브리핑 자동화

permissions:
  contents: write

on:
  schedule:
    # 매일 오전 8시 (한국 시간 기준, UTC-9)
    - cron: '0 23 * * 1-5'  # 월-금 23:00 UTC = 08:00 KST
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  daily-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 코드 체크아웃
        uses: actions/checkout@v3

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📚 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 데일리 브리핑 생성
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DOCS_FOLDER_ID: ${{ secrets.GOOGLE_DOCS_FOLDER_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
        run: |
          python scripts/daily_briefing.py

      - name: 📊 Google Sheets ID 저장
        if: always()
        run: |
          if [ -f .sheets_id ]; then
            SHEETS_ID=$(cat .sheets_id)
            echo "📝 Google Sheets ID: $SHEETS_ID"
            echo "⚠️  GitHub Secrets에 다음 값을 추가하세요:"
            echo "Name: GOOGLE_SHEETS_ID"
            echo "Value: $SHEETS_ID"
          fi

      - name: 📤 GitHub에 커밋 및 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add briefings/
          git commit -m "chore: 데일리 브리핑 자동 생성 - $(date '+%Y-%m-%d')" || echo "No changes to commit"
          git push

      - name: 📊 실행 결과 로깅
        if: always()
        run: |
          echo "✅ 데일리 브리핑 자동화 완료"
          echo "시간: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "📎 GitHub 브리핑 폴더: https://github.com/uuuup-wonjin/portfolio-daily-briefing/tree/main/briefings"
