name: 📊 주간 요약 생성

on:
  schedule:
    # 매주 일요일 오전 8시 (한국 시간 기준, UTC-9)
    - cron: '0 23 * * 0'  # 일요일 23:00 UTC = 08:00 KST
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  weekly-summary:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 코드 체크아웃
        uses: actions/checkout@v3

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📚 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📊 주간 요약 생성 및 저장
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_BRIEFING_DB_ID: ${{ secrets.NOTION_BRIEFING_DB_ID }}
          NLM_NOTEBOOK_ID: ${{ secrets.NLM_NOTEBOOK_ID }}
        run: |
          python scripts/weekly_summary_to_nlm.py

      - name: 📌 실행 결과 로깅
        if: always()
        run: |
          echo "✅ 주간 요약 생성 완료"
          echo "시간: $(date '+%Y-%m-%d %H:%M:%S')"
